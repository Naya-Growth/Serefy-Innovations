name: Deploy Production

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "scripts/*webdev-access.ps1"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Capture deploy ref
        id: deploy_ref
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "DEPLOY_SHA=$sha" >> "$GITHUB_ENV"
          echo "DEPLOY_SHORT_SHA=$short_sha" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --include=optional

      - name: Run tests
        run: npm test

      - name: Verify public assets
        run: npm run verify:assets

      - name: Typecheck
        run: npm run lint

      - name: Validate traefik routing hosts
        run: |
          set -euo pipefail

          if ! grep -Fq 'traefik.http.routers.serefy-innovations-preview.rule:' docker-compose.prod.yml; then
            echo "::error::serefy-innovations-preview router rule is missing in docker-compose.prod.yml"
            exit 1
          fi

          for host in 'serefyinnovations.com' 'www.serefyinnovations.com' 'serefy-innovations.preview.nayagrowth.com'; do
            if ! grep -q "Host(\`$host\`)" docker-compose.prod.yml; then
              echo "::error::Missing traefik host mapping for $host in docker-compose.prod.yml"
              exit 1
            fi
          done

          if ! grep -Fq 'image: nginx:1.27-alpine' docker-compose.prod.yml; then
            echo "::error::Production compose must use the static nginx image, not a per-deploy build."
            exit 1
          fi

          if ! grep -Fq './current:/usr/share/nginx/html:ro' docker-compose.prod.yml; then
            echo "::error::Production compose must mount ./current so release switches are served."
            exit 1
          fi

      - name: Build site
        run: |
          npm run build
          cp nginx.conf dist/nginx.conf

      - name: Prepare static release marker
        env:
          SEREFY_DEPLOY_SOURCE: github-actions
        run: npm run prepare:deploy-artifacts

      - name: Deploy static release through restricted webdev SSH
        env:
          WEBDEV_HOST: ${{ secrets.WEBDEV_HOST }}
          WEBDEV_USER: ${{ secrets.WEBDEV_USER }}
          WEBDEV_SSH_KEY: ${{ secrets.WEBDEV_SSH_KEY }}
          WEBDEV_SSH_PORT: ${{ secrets.WEBDEV_SSH_PORT || '22' }}
          WEBDEV_KNOWN_HOSTS: ${{ secrets.WEBDEV_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${WEBDEV_HOST:?WEBDEV_HOST secret is required}"
          : "${WEBDEV_USER:?WEBDEV_USER secret is required}"
          : "${WEBDEV_SSH_KEY:?WEBDEV_SSH_KEY secret is required}"

          if [ "$WEBDEV_USER" != "webdev" ]; then
            echo "::error::Serefy production deploy must use the restricted webdev SSH user."
            exit 1
          fi

          REMOTE="$WEBDEV_USER@$WEBDEV_HOST"
          SSH_KEY="$RUNNER_TEMP/serefy-actions-key"
          SSH_OPTS=(-i "$SSH_KEY" -p "$WEBDEV_SSH_PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=6)

          install -m 700 -d ~/.ssh
          printf '%s\n' "$WEBDEV_SSH_KEY" | tr -d '\r' > "$SSH_KEY"
          chmod 600 "$SSH_KEY"

          if [ -n "${WEBDEV_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$WEBDEV_KNOWN_HOSTS" | tr -d '\r' >> ~/.ssh/known_hosts
          else
            for attempt in 1 2 3 4; do
              if ssh-keyscan -T 20 -p "$WEBDEV_SSH_PORT" -H "$WEBDEV_HOST" >> ~/.ssh/known_hosts; then
                break
              fi
              if [ "$attempt" = "4" ]; then
                echo "::error::Could not read the Serefy webdev SSH host key after retries."
                exit 1
              fi
              sleep 3
            done
          fi

          if ! ssh-keygen -F "$WEBDEV_HOST" -f ~/.ssh/known_hosts >/dev/null; then
            if ! ssh-keygen -F "[$WEBDEV_HOST]:$WEBDEV_SSH_PORT" -f ~/.ssh/known_hosts >/dev/null; then
              echo "::error::Serefy webdev SSH host key is not present in known_hosts."
              exit 1
            fi
          fi

          tar -czf - dist | timeout 180s ssh "${SSH_OPTS[@]}" "$REMOTE" serefy

      - name: Verify public release
        run: |
          set -euo pipefail
          for url in \
            "https://serefyinnovations.com" \
            "https://www.serefyinnovations.com" \
            "https://serefy-innovations.preview.nayagrowth.com"
          do
            html="$(mktemp)"
            marker="$(mktemp)"

            curl --fail --silent --show-error --location \
              --retry 8 --retry-delay 3 --retry-all-errors \
              -H 'Cache-Control: no-cache' \
              "$url/" -o "$html"
            grep -q 'src_serefy_live_20260605' "$html"

            while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              if ! grep -Fq "$asset" "$html"; then
                echo "::error::Live $url is not serving deployed asset $asset"
                exit 1
              fi
              curl --fail --silent --show-error --head \
                --retry 8 --retry-delay 3 --retry-all-errors \
                "$url/$asset" >/dev/null
            done < serefy-release-assets.txt

            curl --fail --silent --show-error --location \
              --retry 8 --retry-delay 3 --retry-all-errors \
              -H 'Cache-Control: no-cache' \
              "$url/serefy-deploy.json" -o "$marker"
            grep -Fq "\"sha\":\"$DEPLOY_SHA\"" "$marker"
            echo "$url serves $DEPLOY_SHORT_SHA"
            done
