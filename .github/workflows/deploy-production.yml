name: Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --include=optional

      - name: Run tests
        run: npm test

      - name: Verify public assets
        run: npm run verify:assets

      - name: Typecheck
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Upload static release to nivi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          source: "dist,nginx.conf"
          target: "/home/nivi/apps/serefy-innovations-preview/incoming/${{ github.sha }}"
          rm: true

      - name: Switch static release on nivi
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          timeout: 90s
          command_timeout: 15m
          script: |
            set -euo pipefail
            TARGET_DIR="$HOME/apps/serefy-innovations-preview"
            SERVICE="serefy-innovations-preview"
            CONTAINER="serefy-innovations-preview"
            RELEASE="main-${{ github.sha }}"
            INCOMING="$TARGET_DIR/incoming/${{ github.sha }}"
            RELEASE_DIR="$TARGET_DIR/releases/$RELEASE"

            test -d "$INCOMING/dist"
            test -f "$INCOMING/nginx.conf"
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            cp -a "$INCOMING/dist/." "$RELEASE_DIR/"
            cp "$INCOMING/nginx.conf" "$TARGET_DIR/nginx.conf"
            test -f "$RELEASE_DIR/index.html"
            grep -q 'src_serefy_live_20260605' "$RELEASE_DIR/index.html"
            grep -q 'serefyinnovations.com' "$RELEASE_DIR/index.html"
            grep -q 'api.nayagrowth.com' "$TARGET_DIR/nginx.conf"

            ln -sfn "$RELEASE_DIR" "$TARGET_DIR/current"
            cd "$TARGET_DIR"
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate --pull never "$SERVICE"
            docker compose -f docker-compose.prod.yml ps
            docker exec "$CONTAINER" wget -q -O - http://127.0.0.1/healthz
