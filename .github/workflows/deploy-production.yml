name: Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: "main"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Capture deploy ref
        id: deploy_ref
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "DEPLOY_SHA=$sha" >> "$GITHUB_ENV"
          echo "DEPLOY_SHORT_SHA=$short_sha" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --include=optional

      - name: Run tests
        run: npm test

      - name: Verify public assets
        run: npm run verify:assets

      - name: Typecheck
        run: npm run lint

      - name: Validate traefik routing hosts
        run: |
          set -euo pipefail

          if ! grep -Fq 'traefik.http.routers.serefy-innovations-preview.rule:' docker-compose.prod.yml; then
            echo "::error::serefy-innovations-preview router rule is missing in docker-compose.prod.yml"
            exit 1
          fi

          for host in 'serefyinnovations.com' 'www.serefyinnovations.com' 'serefy-innovations.preview.nayagrowth.com'; do
            if ! grep -q "Host(\`$host\`)" docker-compose.prod.yml; then
              echo "::error::Missing traefik host mapping for $host in docker-compose.prod.yml"
              exit 1
            fi
          done

          if ! grep -Fq 'image: nginx:1.27-alpine' docker-compose.prod.yml; then
            echo "::error::Production compose must use the static nginx image, not a per-deploy build."
            exit 1
          fi

          if ! grep -Fq './current:/usr/share/nginx/html:ro' docker-compose.prod.yml; then
            echo "::error::Production compose must mount ./current so release switches are served."
            exit 1
          fi

      - name: Build site
        run: npm run build

      - name: Prepare static release checks
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const html = fs.readFileSync('dist/index.html', 'utf8');
          const assets = [...html.matchAll(/(?:src|href)="\/?(assets\/[^"]+)"/g)]
            .map((match) => match[1])
            .filter((asset) => /\/index-[^/]+\.(js|css)$/.test(asset));
          const uniqueAssets = [...new Set(assets)];

          if (!uniqueAssets.some((asset) => asset.endsWith('.js'))) {
            throw new Error('No built JavaScript asset found in dist/index.html');
          }
          if (!uniqueAssets.some((asset) => asset.endsWith('.css'))) {
            throw new Error('No built CSS asset found in dist/index.html');
          }

          fs.writeFileSync('serefy-release-assets.txt', `${uniqueAssets.join('\n')}\n`);
          fs.writeFileSync(
            'dist/serefy-deploy.json',
            `${JSON.stringify({
              source: 'github-actions',
              repository: process.env.GITHUB_REPOSITORY,
              sha: process.env.DEPLOY_SHA,
              runId: process.env.GITHUB_RUN_ID,
              runAttempt: process.env.GITHUB_RUN_ATTEMPT,
              createdAt: new Date().toISOString(),
            })}\n`,
          );
          NODE
          cat serefy-release-assets.txt

      - name: Deploy static release over SSH stream
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          TARGET_DIR="/home/nivi/apps/serefy-innovations-preview"
          REMOTE="$VPS_USER@$VPS_HOST"
          SSH_KEY="$RUNNER_TEMP/serefy-actions-key"
          SSH_OPTS=(-i "$SSH_KEY" -p "$VPS_SSH_PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          SCP_OPTS=(-i "$SSH_KEY" -P "$VPS_SSH_PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > "$SSH_KEY"
          chmod 600 "$SSH_KEY"
          ssh-keyscan -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh "${SSH_OPTS[@]}" "$REMOTE" "mkdir -p '$TARGET_DIR/incoming/$DEPLOY_SHA'"
          scp "${SCP_OPTS[@]}" nginx.conf docker-compose.prod.yml "$REMOTE:$TARGET_DIR/incoming/$DEPLOY_SHA/"

          ssh "${SSH_OPTS[@]}" "$REMOTE" "set -euo pipefail
            INCOMING='$TARGET_DIR/incoming/$DEPLOY_SHA'
            cp \"\$INCOMING/nginx.conf\" '$TARGET_DIR/nginx.conf'
            cp \"\$INCOMING/docker-compose.prod.yml\" '$TARGET_DIR/docker-compose.prod.yml'
            sed -i -E 's#^([[:space:]]*)traefik\.http\.routers\.serefy-innovations-preview\.rule:.*#      traefik.http.routers.serefy-innovations-preview.rule: Host(\`serefyinnovations.com\`) || Host(\`www.serefyinnovations.com\`) || Host(\`serefy-innovations.preview.nayagrowth.com\`)#' '$TARGET_DIR/docker-compose.prod.yml'
            grep -q 'Host(\`serefyinnovations.com\`)' '$TARGET_DIR/docker-compose.prod.yml'
            grep -q 'Host(\`www.serefyinnovations.com\`)' '$TARGET_DIR/docker-compose.prod.yml'
            grep -q 'Host(\`serefy-innovations.preview.nayagrowth.com\`)' '$TARGET_DIR/docker-compose.prod.yml'
            grep -q 'api.nayagrowth.com' '$TARGET_DIR/nginx.conf'
            grep -q 'image: nginx:1.27-alpine' '$TARGET_DIR/docker-compose.prod.yml'
            grep -q './current:/usr/share/nginx/html:ro' '$TARGET_DIR/docker-compose.prod.yml'
          "

          tar -czf - dist | ssh "${SSH_OPTS[@]}" "$REMOTE" \
            "/usr/local/sbin/serefy-static-deploy --release-prefix 'actions-$DEPLOY_SHORT_SHA'"

      - name: Verify public release
        run: |
          set -euo pipefail
          for url in \
            "https://serefyinnovations.com" \
            "https://www.serefyinnovations.com" \
            "https://serefy-innovations.preview.nayagrowth.com"
          do
            html="$(mktemp)"
            marker="$(mktemp)"

            curl --fail --silent --show-error --location \
              --retry 8 --retry-delay 3 --retry-all-errors \
              -H 'Cache-Control: no-cache' \
              "$url/" -o "$html"
            grep -q 'src_serefy_live_20260605' "$html"

            while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              if ! grep -Fq "$asset" "$html"; then
                echo "::error::Live $url is not serving deployed asset $asset"
                exit 1
              fi
              curl --fail --silent --show-error --head \
                --retry 8 --retry-delay 3 --retry-all-errors \
                "$url/$asset" >/dev/null
            done < serefy-release-assets.txt

            curl --fail --silent --show-error --location \
              --retry 8 --retry-delay 3 --retry-all-errors \
              -H 'Cache-Control: no-cache' \
              "$url/serefy-deploy.json" -o "$marker"
            grep -Fq "\"sha\":\"$DEPLOY_SHA\"" "$marker"
            echo "$url serves $DEPLOY_SHORT_SHA"
            done
