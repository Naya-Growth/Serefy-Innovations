services:
  serefy-innovations-preview:
    image: nginx:1.27-alpine
    container_name: serefy-innovations-preview
    restart: unless-stopped
    cpus: "0.15"
    networks:
      - proxy_net
    volumes:
      - ./current:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy_net
      traefik.http.routers.serefy-innovations-preview.entrypoints: websecure
      traefik.http.routers.serefy-innovations-preview.rule: Host(`serefyinnovations.com`) || Host(`www.serefyinnovations.com`) || Host(`serefy-innovations.preview.nayagrowth.com`)
      traefik.http.routers.serefy-innovations-preview.tls.certresolver: letsencrypt
      traefik.http.services.serefy-innovations-preview.loadbalancer.server.port: "80"

networks:
  proxy_net:
    external: true
